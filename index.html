<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin Dashboard | B2B Management Suite</title>

  <!-- Firebase SDK v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 2.5rem;
      color: white;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
    }

    /* User Profile */
    .user-profile {
      background: white;
      border-radius: 60px;
      padding: 8px 20px 8px 8px;
      display: inline-flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .user-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #667eea;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .user-info {
      text-align: left;
    }

    .user-name {
      font-weight: 600;
      color: #333;
    }

    .user-email {
      font-size: 0.75rem;
      color: #666;
    }

    .logout-btn {
      background: #ef4444;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      font-size: 0.75rem;
      transition: 0.2s;
    }

    .logout-btn:hover {
      background: #dc2626;
      transform: scale(1.02);
    }

    /* Auth Section */
    .auth-section {
      background: white;
      border-radius: 32px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      margin: 50px auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .auth-section h2 {
      color: #333;
      margin-bottom: 15px;
    }

    .auth-section p {
      color: #666;
      margin-bottom: 30px;
    }

    .google-btn {
      background: white;
      border: 2px solid #e2e8f0;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: 0.2s;
    }

    .google-btn:hover {
      background: #f8fafc;
      border-color: #667eea;
      transform: translateY(-2px);
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

    .card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .card-icon {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .card-content {
      padding: 20px 24px 24px;
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1e293b;
    }

    .card-description {
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .card-stats {
      display: flex;
      gap: 15px;
      font-size: 0.7rem;
      color: #94a3b8;
      border-top: 1px solid #eef2ff;
      padding-top: 12px;
      margin-top: 8px;
    }

    .card-stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Color variants */
    .card-1 .card-icon { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card-2 .card-icon { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .card-3 .card-icon { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .card-4 .card-icon { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    .card-5 .card-icon { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .card-6 .card-icon { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }

    /* Loading & Error States */
    .loading {
      text-align: center;
      padding: 60px;
      color: white;
      font-size: 1.2rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 20px 15px; }
      .header h1 { font-size: 1.8rem; }
      .cards-grid { grid-template-columns: 1fr; gap: 18px; }
      .user-profile { padding: 6px 15px 6px 6px; }
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- Content will be dynamically rendered -->
</div>

<script>
  // Firebase Configuration (same as all other panels)
  const firebaseConfig = {
    apiKey: "AIzaSyB44kAWSIrjWmYH75g16-J_Mnkip-HvNBM",
    authDomain: "ayshamall.firebaseapp.com",
    projectId: "ayshamall",
    storageBucket: "ayshamall.firebasestorage.app",
    messagingSenderId: "319564197871",
    appId: "1:319564197871:web:d0de1f012835234494d01a"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Define all admin panels with their file paths and metadata
  const adminModules = [
    {
      id: "b2borders",
      title: "📦 B2B Orders",
      description: "Manage customer orders, track shipments, update order status and payment details.",
      icon: "📊",
      file: "b2borderrs.html",
      color: "card-1",
      stats: ["Orders", "Pending", "Shipped"]
    },
    {
      id: "connectedShops",
      title: "🔗 Connected Shops",
      description: "Manage shop connections, profit percentages, platform integrations and status.",
      icon: "🏪",
      file: "connectedShops.html",
      color: "card-2",
      stats: ["Active", "Pending", "Inactive"]
    },
    {
      id: "sellerApplications",
      title: "📝 Seller Applications",
      description: "Review seller applications, approve/reject, verify documents and images.",
      icon: "👤",
      file: "sellerApplications.html",
      color: "card-3",
      stats: ["Pending", "Approved", "Rejected"]
    },
    {
      id: "merchantApplications",
      title: "🏬 Merchant Applications",
      description: "Manage merchant applications, approve stores, view product images and policies.",
      icon: "🛍️",
      file: "ma.html",
      color: "card-4",
      stats: ["Pending", "Approved", "Review"]
    },
    {
      id: "b2bWebsiteData",
      title: "🌐 B2B Website Data",
      description: "Manage website info, business details, social media links and branding.",
      icon: "🌍",
      file: "c.html",
      color: "card-5",
      stats: ["Websites", "Social Links", "Active"]
    },
    {
      id: "additionalTools",
      title: "⚙️ Admin Tools",
      description: "Additional management tools and system settings for B2B operations.",
      icon: "🔧",
      file: "#",
      color: "card-6",
      stats: ["Settings", "Logs", "Reports"],
      comingSoon: true
    }
  ];

  // Helper to get user initials
  function getInitials(name) {
    if (!name) return "👤";
    return name.charAt(0).toUpperCase();
  }

  // Render authenticated dashboard
  function renderDashboard(user) {
    const displayName = user.displayName || user.email?.split('@')[0] || "Admin";
    const userEmail = user.email || "";
    const userInitial = getInitials(displayName);

    const dashboardHTML = `
      <div class="header">
        <h1>⚡ B2B Admin Dashboard</h1>
        <p>Centralized management for all B2B operations</p>
      </div>

      <div style="display: flex; justify-content: flex-end;">
        <div class="user-profile">
          <div class="user-avatar">${userInitial}</div>
          <div class="user-info">
            <div class="user-name">${escapeHtml(displayName)}</div>
            <div class="user-email">${escapeHtml(userEmail)}</div>
          </div>
          <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
      </div>

      <div class="cards-grid">
        ${adminModules.map(module => `
          <div class="card ${module.color}" onclick="${module.comingSoon ? 'showComingSoon()' : `navigateTo('${module.file}')`}" style="${module.comingSoon ? 'opacity:0.7; cursor:not-allowed;' : 'cursor:pointer'}">
            <div class="card-icon">${module.icon}</div>
            <div class="card-content">
              <div class="card-title">${escapeHtml(module.title)}</div>
              <div class="card-description">${escapeHtml(module.description)}</div>
              <div class="card-stats">
                <span>📊 ${module.stats[0]}</span>
                <span>⏳ ${module.stats[1]}</span>
                <span>✅ ${module.stats[2]}</span>
              </div>
              ${module.comingSoon ? '<div style="margin-top:8px; font-size:0.7rem; color:#f59e0b;">🚧 Coming Soon</div>' : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;

    document.getElementById("app").innerHTML = dashboardHTML;
  }

  // Render login screen
  function renderLogin() {
    const loginHTML = `
      <div class="header">
        <h1>⚡ B2B Admin Dashboard</h1>
        <p>Secure access to all management panels</p>
      </div>

      <div class="auth-section">
        <div style="font-size: 3rem; margin-bottom: 15px;">🔐</div>
        <h2>Welcome to Admin Panel</h2>
        <p>Please authenticate with your Google account to access the admin dashboard and manage B2B operations.</p>
        <button class="google-btn" onclick="loginWithGoogle()">
          <span style="font-size: 1.2rem;">🅶</span> Continue with Google
        </button>
      </div>

      <div style="text-align: center; margin-top: 40px;">
        <p style="color: rgba(255,255,255,0.7); font-size: 0.8rem;">Secure admin access • Role-based permissions • Firebase authentication</p>
      </div>
    `;

    document.getElementById("app").innerHTML = loginHTML;
  }

  // Show loading state
  function renderLoading() {
    document.getElementById("app").innerHTML = `
      <div class="loading">
        <div style="font-size: 2rem;">⏳</div>
        <p>Loading dashboard...</p>
      </div>
    `;
  }

  // Navigation function - checks if file exists and navigates
  window.navigateTo = (filePath) => {
    if (filePath === "#") return;
    
    // Simple validation and navigation
    try {
      window.location.href = filePath;
    } catch (error) {
      console.error("Navigation error:", error);
      alert("Unable to open the module. Please check if the file exists.");
    }
  };

  window.showComingSoon = () => {
    alert("🚧 This module is under development and will be available soon!");
  };

  // Google Login
  window.loginWithGoogle = async () => {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      await auth.signInWithPopup(provider);
      // Auth state observer will handle UI update
    } catch (error) {
      console.error("Login error:", error);
      let errorMessage = "Login failed. Please try again.";
      if (error.code === 'auth/popup-blocked') {
        errorMessage = "Popup was blocked. Please allow popups for this site.";
      } else if (error.code === 'auth/network-request-failed') {
        errorMessage = "Network error. Please check your connection.";
      }
      alert(errorMessage);
    }
  };

  // Logout
  window.logout = async () => {
    try {
      await auth.signOut();
      renderLogin();
    } catch (error) {
      console.error("Logout error:", error);
      alert("Logout failed: " + error.message);
    }
  };

  // Escape HTML helper
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Check if user has access to admin modules (any authenticated user)
  const checkAdminAccess = (user) => {
    // You can add email whitelist logic here if needed
    // For now, any authenticated Google user can access
    return true;
  };

  // Monitor auth state
  auth.onAuthStateChanged((user) => {
    if (user) {
      if (checkAdminAccess(user)) {
        renderDashboard(user);
      } else {
        alert("Access Denied: You don't have admin permissions.");
        auth.signOut();
        renderLogin();
      }
    } else {
      renderLogin();
    }
  });

  // Handle initial load
  renderLoading();

  // Optional: Check for existing session and preload
  setTimeout(() => {
    if (!auth.currentUser) {
      renderLogin();
    }
  }, 500);

  console.log("Admin Dashboard Homepage Loaded - Firebase Auth Ready");
</script>
</body>
</html>
